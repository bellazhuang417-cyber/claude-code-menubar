<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=380, initial-scale=1" />
  <title>Claude Code Menubar</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="dropdown" id="dropdown">
    <div class="dd-head">
      <div class="h-title">
        <span class="tilde">~</span>claude-code
        <span class="pid" id="head-count">· 0 sessions</span>
      </div>
      <div class="summary" id="head-summary">
        <span class="sx work"><i class="sd"></i><span id="cnt-run">0</span> run</span>
        <span class="sx input"><i class="sd"></i><span id="cnt-wait">0</span> wait</span>
        <span class="sx done"><i class="sd"></i><span id="cnt-done">0</span> done</span>
      </div>
    </div>
    <div class="sess-list" id="sess-list">
      <div class="empty" id="empty-state">No active sessions.</div>
    </div>
    <div class="dd-foot">
      <span class="heart"><span class="live"></span>Watching status.json</span>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
